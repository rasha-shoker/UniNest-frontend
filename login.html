<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniNest | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="login-header">
        <h1>Login</h1>
    </header>

    <div class="login-container">
        <form id="loginForm" class="login-form">
            <p class="login-subtitle">Use your university email to continue</p>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" placeholder="Enter your university email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="register-text">
            Don’t have an account?
            <a href="register.html">Create one</a>
        </p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            const email = document.getElementById("email").value.trim().toLowerCase();

            const allowedDomains = [
                "@aub.edu.lb",
                "@lau.edu.lb",
                "@ul.edu.lb",
                "@ua.edu.lb",
                "@usj.edu.lb",
                "@mu.edu.lb"
            ];

            const isValid = allowedDomains.some(domain => email.endsWith(domain));

            if (!isValid) {
                e.preventDefault();
                alert("Please use your university email only.");
            }
        });
    </script>

</body>
</html>
