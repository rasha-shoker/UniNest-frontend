<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | UniNest</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="auth.js"></script>
</head>
<body>

<div class="login-wrapper">

    <div class="login-brand">
        <a href="home.html" class="brand-logo">
            <i class="fa-solid fa-building-user"></i>
            UniNest
        </a>

        <h1>Reset Password</h1>
        <p>Enter your registered email and create a new password to access your UniNest account again.</p>

        <div class="brand-features">
            <div>
                <i class="fa-solid fa-shield-halved"></i>
                <span>Secure account access</span>
            </div>

            <div>
                <i class="fa-solid fa-key"></i>
                <span>Reset your password easily</span>
            </div>

            <div>
                <i class="fa-solid fa-user-check"></i>
                <span>Continue managing your bookings</span>
            </div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-page-header">
                <h2>Forgot Password</h2>
                <p>Reset your UniNest account password</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Account Email</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                </div>

                <button type="submit">
                    <i class="fa-solid fa-key"></i>
                    Reset Password
                </button>
            </form>

            <div class="login-links">
                <p>
                    Remember your password?
                    <a href="login.html">Login</a>
                </p>

                <p>
                    <a href="home.html">Back to Home</a>
                </p>
            </div>
        </div>
    </div>

</div>

<script>
    function formatDateToday() {
        return new Date().toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
        });
    }

    function normalizeUserType(user_type) {
        const value = String(user_type || "student").toLowerCase();

        if (value === "employee") {
            return "employee";
        }

        if (value === "admin") {
            return "admin";
        }

        return "student";
    }

    function splitFullName(fullName) {
        const parts = fullName.trim().split(" ").filter(part => part !== "");

        const first_name = parts[0] || "";
        const last_name = parts.length > 1 ? parts.slice(1).join(" ") : "";

        return {
            first_name: first_name,
            last_name: last_name
        };
    }

    function normalizeResident(resident) {
        const oldFullName = resident.fullName || resident.name || "";
        const splitName = splitFullName(oldFullName);

        const first_name = resident.first_name || resident.firstName || splitName.first_name || "";
        const last_name = resident.last_name || resident.lastName || splitName.last_name || "";

        const user_type = normalizeUserType(resident.user_type || resident.role);

        return {
            ...resident,

            resident_id: resident.resident_id || resident.id || Date.now() + Math.floor(Math.random() * 1000),
            first_name: first_name,
            last_name: last_name,
            email: resident.email || "",
            password: resident.password || "",
            phone: resident.phone || "",
            user_type: user_type,

            university_name: user_type === "student" ? (resident.university_name || resident.university || "") : "",
            major: user_type === "student" ? (resident.major || "") : "",

            company_name: user_type === "employee" ? (resident.company_name || resident.company || "") : "",
            job_position: user_type === "employee" ? (resident.job_position || resident.jobTitle || "") : "",

            profile_image: resident.profile_image || resident.profileImage || "",
            created_at: resident.created_at || resident.createdAt || formatDateToday(),
            updated_at: resident.updated_at || resident.updatedAt || "",

            // Compatibility مع الصفحات القديمة
            id: resident.resident_id || resident.id || Date.now() + Math.floor(Math.random() * 1000),
            fullName: (first_name + " " + last_name).trim(),
            name: (first_name + " " + last_name).trim(),
            role: user_type,
            university: user_type === "student" ? (resident.university_name || resident.university || "") : "",
            company: user_type === "employee" ? (resident.company_name || resident.company || "") : "",
            jobTitle: user_type === "employee" ? (resident.job_position || resident.jobTitle || "") : "",
            profileImage: resident.profile_image || resident.profileImage || "",
            createdAt: resident.created_at || resident.createdAt || formatDateToday(),
            updatedAt: resident.updated_at || resident.updatedAt || ""
        };
    }

    function getResidentsData() {
        const residents = JSON.parse(localStorage.getItem("residents"));
        const users = JSON.parse(localStorage.getItem("users"));

        if (residents && Array.isArray(residents)) {
            return residents.map(normalizeResident);
        }

        if (users && Array.isArray(users)) {
            const normalizedResidents = users.map(normalizeResident);
            saveResidentsData(normalizedResidents);
            return normalizedResidents;
        }

        return [];
    }

    function saveResidentsData(residents) {
        const normalizedResidents = residents.map(normalizeResident);

        localStorage.setItem("residents", JSON.stringify(normalizedResidents));

        // Compatibility مع login/profile القديم
        localStorage.setItem("users", JSON.stringify(normalizedResidents));
    }

    document.getElementById("forgotPasswordForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim().toLowerCase();
        const newPassword = document.getElementById("newPassword").value.trim();
        const confirmPassword = document.getElementById("confirmPassword").value.trim();

        if (!email || !newPassword || !confirmPassword) {
            alert("Please fill all fields.");
            return;
        }

        if (newPassword.length < 6) {
            alert("Password must be at least 6 characters.");
            return;
        }

        if (newPassword !== confirmPassword) {
            alert("Passwords do not match.");
            return;
        }

        let residents = getResidentsData();

        const residentIndex = residents.findIndex(function(resident) {
            return (resident.email || "").toLowerCase() === email;
        });

        if (residentIndex === -1) {
            alert("No account found with this email.");
            return;
        }

        residents[residentIndex] = normalizeResident({
            ...residents[residentIndex],
            password: newPassword,
            updated_at: formatDateToday(),

            // Compatibility
            updatedAt: formatDateToday()
        });

        saveResidentsData(residents);

        alert("Password reset successfully. You can now login.");
        window.location.href = "login.html";
    });
</script>

</body>
</html>
